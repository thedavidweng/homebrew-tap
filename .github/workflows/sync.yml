name: Sync Releases

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: sync-pixiv-swiftui
  cancel-in-progress: false

jobs:
  sync:
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Homebrew tap
        run: brew tap thedavidweng/homebrew-tap "$GITHUB_WORKSPACE"

      - name: Refresh local main
        run: |
          git fetch origin main
          git rebase origin/main

      - name: Sync cask releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/sync_cask_release.py --app pixiv-swiftui --app openkara

      - name: Run sync tests
        run: python -m unittest tests.test_sync_cask_release

      - name: Audit casks
        run: |
          brew audit --cask --strict --tap thedavidweng/homebrew-tap pixiv-swiftui
          brew audit --cask --strict --tap thedavidweng/homebrew-tap openkara

      - name: Commit and push changes
        run: |
          owned_casks=(
            Casks/pixiv-swiftui.rb
            Casks/openkara.rb
          )
          mapfile -t changed_casks < <(git diff --name-only --diff-filter=ACMR -- "${owned_casks[@]}")
          if [ "${#changed_casks[@]}" -eq 0 ]; then
            echo "No cask changes to commit"
            exit 0
          fi

          git add "${changed_casks[@]}"
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m 'Update synced cask releases'
          git push origin HEAD:main
